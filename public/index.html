<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BW&SZ's space</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

	  <main id="loginView" class="login-shell hidden" aria-live="polite">
	    <section class="login-card">
	      <img class="login-avatar" src="./assets/dog.jpg" alt="BW&SZ avatar">
	      <h1>BW&SZ's space</h1>
	      <form id="loginForm" class="login-form">
	        <label>用户名<input id="username" autocomplete="username" required placeholder="bw / sz"></label>
	        <label>密码<input id="password" type="password" autocomplete="current-password" required placeholder="本地密码"></label>
	        <button type="submit">进入空间</button>
	        <p id="loginMessage" class="form-message" role="alert"></p>
	      </form>
	    </section>
	  </main>

  <div id="appView" class="app-shell hidden">
    <aside class="sidebar">
      <div class="side-head">
        <img class="profile-avatar" src="./assets/dog.jpg" alt="BW&SZ avatar">
        <div>
          <strong>BW&SZ's space</strong>
          <span>Two PhDs</span>
        </div>
      </div>
      <div class="time-card">
        <span id="todayText">--</span>
        <strong id="timeText">--:--</strong>
      </div>
      <div id="areaNav" class="area-nav" aria-label="一级入口"></div>
      <nav id="moduleNav" class="module-nav" aria-label="主导航"></nav>
      <button id="logoutBtn" class="ghost-button">退出登录</button>
    </aside>

    <section class="workspace">
      <header class="hero-card">
        <div>
          <p class="eyebrow">我们的小窝</p>
          <h1 id="heroTitle">BW&SZ's space</h1>
          <p id="heroSubtitle">两个工程博士的生活、科研与长期主义基地</p>
        </div>
        <div class="hero-actions">
          <button id="saveBtn" class="primary-button">保存更改</button>
          <button id="exportBtn" class="secondary-button">导出备份</button>
        </div>
      </header>

      <section id="content" class="content-grid" aria-live="polite"></section>
    </section>
  </div>

  <template id="cardTemplate">
    <article class="panel-card"></article>
  </template>

  <script src="./firebase-config.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
